name: Deploy Backend Infrastructure

on:
  push:
    branches: [master]
    paths:
      - 'terraform/**'
      - 'backend/**'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.8.5"

jobs:
  terraform:
    name: Terraform CI/CD Pipeline
    runs-on: ubuntu-latest

    # This sets the working directory for ALL run commands below, keeping the code clean
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── STAGE 0: Packages scan
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Application Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Scan Packages for Vulnerabilities (npm audit)
        working-directory: ./backend
        run: npm audit --audit-level=high

      - name: Scan Code for Secrets and Vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          hide-progress: true
          format: 'table'
          exit-code: '1' # Fails the pipeline if it catches anything
          severity: 'CRITICAL,HIGH'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── STAGE 1: FORMAT GATE ──
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check

      # ── STAGE 2: MODULE & SYNTAX CHECK ──
      - name: Terraform Init
        id: init
        run: terraform init -backend-config=environments/dev/backend.hcl

      # Validate checks for typo'd variables, bad module references, and invalid HCL
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # ── STAGE 3: PLAN ──
      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_github_token: ${{ secrets.AMPLIFY_GITHUB_PAT }}

      # ── STAGE 4: APPLY ──
      - name: Terraform Apply
        id: apply
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_github_token: ${{ secrets.AMPLIFY_GITHUB_PAT }}
