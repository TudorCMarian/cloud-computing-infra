name: Deploy Backend Infrastructure

on:
  push:
    branches: [master]
  # Allows you to trigger this workflow manually from the GitHub Actions tab
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.8.5"

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Using standard secrets for AWS Academy temporary credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Required for lab accounts
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        # Adjust this path if your root main.tf is not in the 'terraform' folder
        working-directory: ./terraform
        run: terraform init -backend-config=environments/dev/backend.hcl
        # If you are using an S3 backend file, append: -backend-config=environments/dev/backend.hcl

      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve
